<link rel="manifest" href="manifest-dashboard.json">
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/yefryZA/PT.BBS/main/logo.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #0a192f; color: #fff; margin: 0; padding: 20px; }
    
    /* Layout Header Sederhana */
    .header { display: flex; justify-content: space-between; align-items: center; background: #112240; padding: 15px 30px; border-radius: 12px; border: 1px solid #233554; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .header-left { display: flex; align-items: center; gap: 15px; }
    .logo { width: 60px; height: auto; }
    .header-title h1 { margin: 0; font-size: 22px; color: #64ffda; letter-spacing: 1px; }
    .header-title p { margin: 5px 0 0 0; font-size: 12px; color: #8892b0; }

    /* CONTAINER RADAR PETA UTAMA */
    #map { 
        width: 100%; 
        height: 650px; 
        border-radius: 12px; 
        border: 1px solid #233554; 
        margin-bottom: 25px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        z-index: 1; 
    }

    /* Kumpulan Statistik Ringan */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
    .stat-card { background: #112240; padding: 20px; border-radius: 12px; border: 1px solid #233554; text-align: center; }
    .stat-card h3 { margin: 0; font-size: 14px; color: #8892b0; text-transform: uppercase; }
    .stat-card .value { font-size: 32px; font-weight: bold; margin: 10px 0 0 0; color: #64ffda; }
    .stat-card.otw { border-left: 5px solid #ffaa00; }
    .stat-card.selesai { border-left: 5px solid #00ff66; }

    /* Leaflet Customization */
    .leaflet-popup-content-wrapper { background: #112240; color: #fff; border: 1px solid #233554; font-size: 12px; }
    .leaflet-popup-tip { background: #112240; }
    
    .leaflet-tooltip.map-plat-label {
        background-color: #112240 !important;
        color: #fff !important;
        border: 1px solid #233554 !important;
        border-radius: 4px !important;
        padding: 3px 8px !important;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5) !important;
        font-weight: bold !important;
    }
    .leaflet-tooltip-top.map-plat-label::before {
        border-top-color: #112240 !important;
    }
</style>
</head><body>
    <div class="header">
    <div class="header-left">
        <img src="https://raw.githubusercontent.com/yefryZA/PT.BBS/main/logo.png" class="logo" alt="Logo BBS">
        <div class="header-title">
            <h1>PT. BERKAH BAJA STEEL</h1>
            <p>Live GPS Monitoring System — Proyek Losarang SATOE</p>
        </div>
    </div>
</div>

<div id="map"></div>

<div class="stats-grid">
    <div class="stat-card">
        <h3>Total Register Armada</h3>
        <div class="value" id="stat-total">0</div>
    </div>
    <div class="stat-card otw">
        <h3>Armada OTW (Dipantau)</h3>
        <div class="value" id="stat-otw" style="color: #ffaa00;">0</div>
    </div>
    <div class="stat-card selesai">
        <h3>Selesai Bongkar</h3>
        <div class="value" id="stat-selesai" style="color: #00ff66;">0</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = { 
    apiKey: "AIzaSyAfeLTKRQ66tjZjAt7tg6KcrWhtmv0y3fo", 
    databaseURL: "https://berkah-baja-steel-default-rtdb.asia-southeast1.firebasedatabase.app", 
    projectId: "berkah-baja-steel" 
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbKey = "BBS_PROYEK_SATOE";

// INITIALIZATION PETA
const map = L.map('map').setView([-6.4025, 108.1741], 11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

let armadaMarkers = {};
let rawDataCache = [];

const bbsTruckIcon = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/yefryZA/PT.BBS/main/logo.png',
    iconSize: [35, 35], 
    iconAnchor: [17, 35],
    popupAnchor: [0, -35]
});

// 🧠 FUNGSI HITUNG STATUS SINYAL (LOGIKA MONITORING)
function hitungStatusSinyal(waktuUpdateTerakhir, statusPerjalanan, waktuMulaiAwal) {
    if (statusPerjalanan === "SELESAI_BONGKAR") {
        return { teks: "🏁 SELESAI", warna: "#8892b0", barisBg: "transparent" };
    }

    const waktuPatokan = waktuUpdateTerakhir || waktuMulaiAwal;

    if (!waktuPatokan) {
        return { teks: "⏳ MENCARI GPS", warna: "#ffb74d", barisBg: "transparent" };
    }

    const waktuSekarangMili = Date.now();
    const waktuDriverMili = typeof waktuPatokan === "number" ? waktuPatokan : new Date(waktuPatokan).getTime();
    
    const selisihMilidetik = waktuSekarangMili - waktuDriverMili;
    const selisihMenit = selisihMilidetik / (1000 * 60);

    console.log(`[BBS LOG] Selisih: ${selisihMenit.toFixed(2)} Menit.`);

    // Toleransi 24 jam (1440 menit)
    if (selisihMenit > 1440 || selisihMenit < -60) { 
        return { 
            teks: "🔴 OFFLINE (HP Mati)", 
            warna: "#ff4c4c", 
            barisBg: "rgba(255, 76, 76, 0.08)" 
        };
    } else {
        return { 
            teks: "🟢 ONLINE", 
            warna: "#00e676", 
            barisBg: "transparent" 
        };
    }
}

// 🔄 FUNGSI UPDATE PETA DAN STATISTIK SAJA
function updateMapDanStats() {
    if (rawDataCache.length === 0) {
        updateStatistik(0, 0, 0);
        return;
    }

    let totalArmada = 0;
    let totalOtw = 0;
    let totalSelesai = 0;
    const currentActiveIds = [];

    // Detektor Kembar - Sama Posisi_auto_lar
    const hitungPosisi = {};
    rawDataCache.forEach(d => {
        if (d.lat && d.lng && d.status_perjalanan === "MENGIRIM_POSISI") {
            const pembulatLat = Math.round(d.lat * 10000) / 10000;
            const pembulatLng = Math.round(d.lng * 10000) / 10000;
            const kuncianKoor = `${pembulatLat}_${pembulatLng}`;
            hitungPosisi[kuncianKoor] = (hitungPosisi[kuncianKoor] || 0) + 1;
        }
    });

    let koordinatSatuLokasi = null;

    rawDataCache.forEach((data, index) => {
        totalArmada++;
        currentActiveIds.push(data.id_track);
        
        const tglUpdate = data.waktu_update ? new Date(data.waktu_update).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'}) : "-";

        const infoSinyal = hitungStatusSinyal(data.waktu_update, data.status_perjalanan, data.waktu_mulai);

        if (data.status_perjalanan === "MENGIRIM_POSISI") {
            totalOtw++;
            if (infoSinyal.teks.includes("OFFLINE")) {
                // Status offline
            } else {
                // Status online
            }
        } else {
            totalSelesai++;
        }

        let koordinatTxt = "Mencari GPS...";
        if (data.lat && data.lng) {
            koordinatTxt = `${data.lat.toFixed(5)}, ${data.lng.toFixed(5)}`;

            if (data.status_perjalanan === "MENGIRIM_POSISI") {
                
                let finalLat = Number(data.lat);
                let finalLng = Number(data.lng);
                
                const pembulatLat = Math.round(data.lat * 10000) / 10000;
                const pembulatLng = Math.round(data.lng * 10000) / 10000;
                const kuncianKoor = `${pembulatLat}_${pembulatLng}`;
                
                // Ambil satu lokasi untuk center peta
                if (!koordinatSatuLokasi) {
                    koordinatSatuLokasi = [finalLat, finalLng];
                }

                // Penyebab Kembar_auto_lar jarak sebar
                if (hitungPosisi[kuncianKoor] > 1) {
                    finalLat += Math.sin(index) * 0.0015;
                    finalLng += Math.cos(index) * 0.0015;
                }

                // Update atau buat baru marker di Peta Leaflet
                if (armadaMarkers[data.id_track]) {
                    armadaMarkers[data.id_track].setLatLng([finalLat, finalLng]);
                } else {
                    armadaMarkers[data.id_track] = L.marker([finalLat, finalLng], {icon: bbsTruckIcon}).addTo(map);
                }
                
                let warnaLabelSinyal = infoSinyal.teks.includes("OFFLINE") ? "#ff4c4c" : "#64ffda";
                armadaMarkers[data.id_track].bindTooltip(`<b style="color:${warnaLabelSinyal}; font-size:12px;">${data.plat_nomor}</b>`, {
                    permanent: true,
                    direction: 'top',
                    offset: [0, -30],
                    className: 'map-plat-label'
                }).openTooltip();

                armadaMarkers[data.id_track].bindPopup(`
                    <div style="color:#fff; font-size:13px;">
                        Plat Nomor: <b style="color:#64ffda;">${data.plat_nomor}</b><br>
                        Nama Sopir: <b>${data.nama_sopir}</b><br>
                        Koneksi: <span style="color:${infoSinyal.warna}; font-weight:bold;">${infoSinyal.teks}</span><br>
                        Update Terakhir: <span style="color:#8892b0;">${tglUpdate} WIB</span>
                    </div>
                `);
            } 
        } else {
            if (armadaMarkers[data.id_track]) {
                map.removeLayer(armadaMarkers[data.id_track]);
                delete armadaMarkers[data.id_track];
            }
        }
    });

    // Hapus marker yang sudah tidak ada
    for (const id_track in armadaMarkers) {
        if (!currentActiveIds.includes(id_track)) {
            map.removeLayer(armadaMarkers[id_track]);
            delete armadaMarkers[id_track];
        }
    }

    updateStatistik(totalArmada, totalOtw, totalSelesai);

    // Fokus peta ke lokasi pertama saja sekali saat load awal
    if (koordinatSatuLokasi && !window.petaSudahFokus) {
        map.setView(koordinatSatuLokasi, 14);
        window.petaSudahFokus = true;
    }
}
    
// 2. MONITORING REALTIME DATA DARI FIREBASE
onValue(ref(db, `bbs_tracking/${dbKey}`), (snapshot) => {
    rawDataCache = [];
    if (snapshot.exists()) {
        snapshot.forEach((childSnapshot) => {
            rawDataCache.push(childSnapshot.val());
        });
        rawDataCache.reverse(); 
    } else {
        for (const id in armadaMarkers) {
            map.removeLayer(armadaMarkers[id]);
        }
        armadaMarkers = {};
    }
    updateMapDanStats();
});

function updateStatistik(total, otw, selesai) {
    document.getElementById('stat-total').innerText = total;
    document.getElementById('stat-otw').innerText = otw;
    document.getElementById('stat-selesai').innerText = selesai;
}

// ⏳ REFRESH STATUS SINYAL SETIAP 30 DETIK
setInterval(() => {
    console.log("🔍 Cek koneksi HP sopir...");
    updateMapDanStats();
}, 30 * 1000);

// KODE SERVICE WORKER (JIKA PWA)
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js', { scope: './' })
            .then((reg) => console.log('🚀 PWA Aktif!', reg))
            .catch((err) => console.error('❌ Eror PWA:', err));
    });
}
</script>
