<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INPUT KAS - RIZAL</title>
    
    <link rel="manifest" href="manifest_inputKAS.json">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --dark: #0a192f; --light-dark: #112240; --gold: #ffb400; --green: #2ecc71; --red: #e74c3c; --text: #ccd6f6; --slate: #8892b0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        .btn { width: 100%; padding: 20px; border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 16px; }
        .bg-green { background: var(--green); }
        .bg-red { background: var(--red); }
        .btn-pdf { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        
        /* Modal Style */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); padding: 20px; z-index: 999; }
        .modal-content { background: var(--light-dark); padding: 25px; border-radius: 20px; border: 1px solid var(--gold); margin-top: 50px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: var(--dark); border: 1px solid #233554; color: white; border-radius: 10px; box-sizing: border-box; }
        
        /* --- STYLE DROPDOWN KOREKSI --- */
        .dropdown-header { 
            background: var(--light-dark); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid var(--gold); 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-top: 20px;
            font-weight: bold;
            color: var(--gold);
        }
        .dropdown-content { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.3s ease-out; 
            background: rgba(17, 34, 64, 0.5);
            border-radius: 0 0 12px 12px;
        }
        .dropdown-content.active { 
            max-height: 500px; 
            overflow-y: auto; 
            border: 1px solid #233554;
            border-top: none;
            padding: 10px;
        }
        .item-koreksi { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #233554; }
        .btn-hapus { background: none; border: 1px solid var(--red); color: var(--red); border-radius: 8px; cursor: pointer; padding: 5px 10px; font-size: 11px; }
        .arrow { transition: transform 0.3s; }
        .arrow.rotate { transform: rotate(180deg); }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center; color:var(--gold);">PROJECT Bp. RIZAL</h2>
    <button class="btn bg-green" onclick="openModal('IN')">➕ UANG MASUK</button>
    <button class="btn bg-red" onclick="openModal('OUT')">💸 PENGELUARAN / KASBON</button>
    <button class="btn btn-pdf" onclick="generatePDF()">📄 DOWNLOAD PDF</button>

    <div class="dropdown-header" onclick="toggleDropdown()">
        <span>⚙️ PENGATURAN / KOREKSI DATA</span>
        <span class="arrow" id="arrow-icon">▼</span>
    </div>
    <div class="dropdown-content" id="dropdown-area">
        <div id="list-koreksi">
            <p style="text-align:center; color:var(--slate); font-size: 12px; padding: 20px;">Memuat riwayat...</p>
        </div>
    </div>
</div>

<div id="modal-kas" class="modal">
    <div class="modal-content" style="padding: 15px; margin-top: 20px;">
        <h3 id="modal-title" style="color:#ffffff; margin: 0 0 15px 0; text-align: center;">INPUT DATA</h3> 
        
        <input type="text" id="kas-ket" placeholder="Keterangan Transaksi" 
               style="font-family: 'Arial Black', Gadget, sans-serif; font-weight: 900; font-size: 16px; color: #ffffff; height: 45px; margin: 5px 0; letter-spacing: 1px;">
        
        <input type="text" id="kas-nom" placeholder="0" oninput="formatRupiah(this)" 
               style="font-family: 'Arial Black', Gadget, sans-serif; font-weight: 900; font-size: 18px; color: #ffffff; height: 50px; margin: 5px 0; letter-spacing: 1px;">

        <input type="hidden" id="kas-tipe">

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button class="btn bg-green" onclick="simpan()" style="margin: 0; flex: 1; padding: 15px;">SIMPAN</button>
            <button class="btn" onclick="closeModal()" style="margin: 0; flex: 1; padding: 15px; color: black !important; background-color: #f1f1f1;">BATAL</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, push, get, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA_wvEsCCOEjiwxui7_pdOrG8-xMBCw3mw",
        authDomain: "barcode-warung-81e97.firebaseapp.com",
        databaseURL: "https://barcode-warung-81e97-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "barcode-warung-81e97",
        appId: "1:1089837830503:web:410644c17a04314e37dfc2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const pathKas = `BUKU_KAS`;

    // --- FUNGSI TOGGLE DROPDOWN ---
    window.toggleDropdown = () => {
        const content = document.getElementById('dropdown-area');
        const arrow = document.getElementById('arrow-icon');
        content.classList.toggle('active');
        arrow.classList.toggle('rotate');
    }

    window.openModal = (t) => {
        document.getElementById('kas-tipe').value = t;
        document.getElementById('modal-title').innerText = t === 'IN' ? "TAMBAH SALDO" : "PENGELUARAN / KASBON";
        document.getElementById('modal-kas').style.display = 'block';
    }
    window.closeModal = () => {
        document.getElementById('modal-kas').style.display = 'none';
        document.getElementById('kas-ket').value = "";
        document.getElementById('kas-nom').value = "";
    }

    window.formatRupiah = (objek) => {
        let angka = objek.value.replace(/[^,\d]/g, "").toString();
        let split = angka.split(",");
        let sisa = split[0].length % 3;
        let rupiah = split[0].substr(0, sisa);
        let ribuan = split[0].substr(sisa).match(/\d{3}/gi);
        if (ribuan) {
            let separator = sisa ? "." : "";
            rupiah += separator + ribuan.join(".");
        }
         rupiah = split[1] != undefined ? rupiah + "," + split[1] : rupiah;
        objek.value = rupiah;
    }

    window.simpan = async () => {
        const k = document.getElementById('kas-ket').value;
        const nRaw = document.getElementById('kas-nom').value;
        const t = document.getElementById('kas-tipe').value;
        const n = Number(nRaw.replace(/\./g, ''));
        if(!k || !n) return alert("Isi Data Dulu Bang!");
        try {
            await push(ref(db, pathKas), {
                tgl: new Date().toLocaleDateString('id-ID'),
                jam: new Date().toLocaleTimeString('id-ID'),
                keterangan: k.toUpperCase(), // Otomatis mengubah semua huruf inputan kasbon menjadi KAPITAL di database
                nominal: n,
                tipe: t,
                ts: serverTimestamp()
            });
            alert("Tersimpan!"); closeModal();
        } catch (e) { alert("Error: " + e.message); }
    }

    onValue(ref(db, pathKas), (snapshot) => {
        let html = "";
        const data = snapshot.val();
        if(data) {
            Object.keys(data).reverse().forEach(key => {
                const item = data[key];
                const warna = item.tipe === 'IN' ? 'var(--green)' : 'var(--red)';
                html += `
                    <div class="item-koreksi">
                        <div style="flex: 1;">
                            <div style="font-weight: bold; font-size: 13px; color: ${warna}">${item.keterangan}</div>
                            <div style="color: var(--slate); font-size: 10px;">${item.tgl} | Rp ${item.nominal.toLocaleString('id-ID')}</div>
                        </div>
                        <button class="btn-hapus" onclick="hapusData('${key}', '${item.keterangan}')">HAPUS</button>
                    </div>`;
            });
        }
        document.getElementById('list-koreksi').innerHTML = html || "<p style='padding:20px;text-align:center;font-size:12px;'>Belum ada data</p>";
    });

    window.hapusData = (id, ket) => {
        if(confirm(`Hapus transaksi: "${ket}"?`)) {
            remove(ref(db, `${pathKas}/${id}`)).then(() => alert("Terhapus!"));
        }
    }

    window.generatePDF = async () => {
        const snap = await get(ref(db, pathKas));
        if(!snap.exists()) return alert("Data masih kosong, Bang!");
        
        // --- KONFIRMASI RESET ATAU TIDAK (YES / NO) ---
        const mauReset = confirm("Apakah data di Firebase mau langsung DI-RESET (DIHAPUS)?\n\n• Klik OK (YES) = Download + Hapus Data\n• Klik CANCEL (NO) = Download Saja (Data Aman)");

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(16);
        doc.text("LAPORAN KAS PT. BBS", 105, 15, { align: "center" });
        
        // --- LOGIKA HITUNG MATEMATIKA UNTUK RINGKASAN ---
        let akModal = 0;
        let akProfit = 0;
        let akKasbon = 0;
        let runningSaldo = 0;

        const body = Object.values(snap.val()).map((v, i) => {
            const isIn = v.tipe === 'IN';
            const nom = v.nominal || 0;
            const ketUpper = (v.keterangan || "").toUpperCase();

            if (isIn) {
                if (ketUpper.includes("MODAL")) { akModal += nom; } 
                else { akProfit += nom; }
            } else {
                if (ketUpper.includes("KASBON")) {
                    akKasbon += nom;
                    akProfit -= nom;
                } else {
                    let sisaOut = nom;
                    if (akModal >= sisaOut) {
                        akModal -= sisaOut;
                        sisaOut = 0;
                    } else {
                        sisaOut -= akModal;
                        akModal = 0;
                    }
                    if (sisaOut > 0) { akProfit -= sisaOut; }
                }
            }

            runningSaldo += isIn ? nom : -nom;

            return [
                i+1, 
                v.tgl, 
                v.keterangan, 
                isIn ? nom.toLocaleString('id-ID') : '-', 
                !isIn ? nom.toLocaleString('id-ID') : '-', 
                runningSaldo.toLocaleString('id-ID')
            ];
        });

        // Gambar Tabel Utama
        doc.autoTable({ head: [['NO', 'TGL', 'KETERANGAN', 'IN', 'OUT', 'SALDO']], body, startY: 28, theme: 'grid' });
        
        // --- SEKTOR RINGKASAN & TANDA TANGAN ---
        const fY = doc.lastAutoTable.finalY + 15; 
        const pW = doc.internal.pageSize.getWidth();
        const pH = doc.internal.pageSize.getHeight();
        
        // 1. Judul Ringkasan
        doc.setFontSize(11);
        doc.setFont("helvetica", "bold");
        doc.setTextColor(10, 25, 47); // Warna gelap standar
        doc.text("RINGKASAN KEUANGAN PERIODE INI:", 14, fY);
        
        // Trik Meratakan Titik Dua (:): Kita pisah posisi koordinat X-nya
        const posXLabel = 14;  // Koordinat teks label awal
        const posXTitik = 52;  // Koordinat titik dua (Sejajar lurus ke bawah)
        const posXAngka = 55;  // Koordinat nominal angka keuangan
        
        // 2. Baris Modal Berjalan (Normal Hitam)
        doc.setFont("helvetica", "normal");
        doc.setTextColor(0, 0, 0); 
        doc.text("• Modal Berjalan", posXLabel, fY + 8);
        doc.text(":", posXTitik, fY + 8);
        doc.text(`Rp ${akModal.toLocaleString('id-ID')}`, posXAngka, fY + 8);
        
        // 3. Baris Profit Bersih (Warna HIJAU)
        doc.setFont("helvetica", "bold"); // Dipertebal agar warna hijaunya tegas
        doc.setTextColor(46, 204, 113);  // Kode warna #2ecc71 (Hijau)
        doc.text("• Profit Bersih", posXLabel, fY + 15);
        doc.text(":", posXTitik, fY + 15);
        const txtProfit = akProfit >= 0 ? `Rp ${akProfit.toLocaleString('id-ID')}` : `Rp -${Math.abs(akProfit).toLocaleString('id-ID')}`;
        doc.text(txtProfit, posXAngka, fY + 15);
        
        // 4. Baris Total Pengeluaran (Warna MERAH)
        doc.setTextColor(231, 76, 60);   // Kode warna #e74c3c (Merah)
        doc.text("• Total Pengeluaran", posXLabel, fY + 22);
        doc.text(":", posXTitik, fY + 22);
        doc.text(`Rp ${akKasbon.toLocaleString('id-ID')}`, posXAngka, fY + 22);
        
        // 5. Garis Pembatas Ringkasan & Total Akhir Saldo
        doc.setTextColor(0, 0, 0); // Balikkan ke hitam
        doc.line(14, fY + 25, 90, fY + 25); 
        doc.setFont("helvetica", "bold");
        doc.text("TOTAL SALDO KAS", posXLabel, fY + 31);
        doc.text(":", posXTitik, fY + 31);
        doc.text(`Rp ${(akModal + akProfit).toLocaleString('id-ID')}`, posXAngka, fY + 31);
        
        // --- SEKTOR TANDA TANGAN (SISI KANAN) ---
        doc.setFont("helvetica", "normal");
        doc.text("Dibuat oleh,", pW-60, fY);
        doc.setFont("helvetica", "bold");
        doc.text("Yefry ZA.", pW-60, fY+23);
        doc.line(pW-60, fY+24, pW-60+doc.getTextWidth("Yefry ZA."), fY+24);
        doc.setFont("helvetica", "normal");
        doc.text("Manager", pW-60, fY+29);
        
        // Footer Sistem Paling Bawah Kertas
        doc.setFontSize(8); doc.setTextColor(150); doc.setFont("helvetica", "italic");
        doc.text("Laporan ini dibuat secara otomatis oleh system digital PT. BBS", pW/2, pH-10, {align:"center"});
        
        // Download File Selalu Jalan
        doc.save(`Laporan_Kas_BBS.pdf`);

        // --- EKSEKUSI RESET BERDASARKAN PILIHAN (YES / NO) ---
        if (mauReset) {
            try {
                await remove(ref(db, pathKas));
                alert("Laporan Berhasil didownload & Data Kas di Firebase telah DI-RESET!");
            } catch (e) {
                alert("Gagal meriset data: " + e.message);
            }
        } else {
            alert("Laporan Berhasil didownload! Data di Firebase TETAP AMAN (Tidak Dihapus).");
        }
    }
</script>
</body>
</html>
