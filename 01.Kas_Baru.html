<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIEWER - KAS BERSAMA</title>
    <style>
        :root { --dark: #0a192f; --light-dark: #112240; --gold: #ffb400; --green: #2ecc71; --red: #e74c3c; --text: #ccd6f6; --slate: #8892b0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        
        .card-saldo { background: var(--light-dark); padding: 22px 20px; border-radius: 25px; text-align: center; border: 1px solid rgba(255, 180, 0, 0.2); margin-bottom: 12px; border-top: 5px solid var(--gold); }
        
        /* Layout untuk box Modal dan Profit agar berdampingan rapi di layar HP */
        .sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card-mini { background: var(--light-dark); padding: 15px 10px; border-radius: 18px; text-align: center; border: 1px dashed rgba(255, 255, 255, 0.1); }
        
        #admin-area { display: none; background: #1d3557; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--green); text-align: center; }
        
        .saldo-amount { font-size: 34px; font-weight: bold; color: var(--gold); margin: 5px 0; }
        .mini-amount { font-size: 18px; font-weight: bold; margin-top: 5px; }
        .saldo-admin { font-size: 26px; font-weight: bold; color: var(--green); }
        
        .list-container { background: var(--light-dark); border-radius: 20px; padding: 15px; border: 1px solid #233554; }
        .item-kas { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #233554; }
        .item-ket { font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .item-tgl { font-size: 10px; color: var(--slate); }
        .nom-in { color: var(--green); }
        .nom-out { color: var(--red); }
        
        .txt-untung { color: var(--green) !important; }
        .txt-rugi { color: var(--red) !important; }
        .txt-normal { color: #ffffff !important; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center; color:var(--gold); letter-spacing: 1px; margin-bottom: 20px;">MONITORING KAS</h2>

    <div id="admin-area">
        <div style="font-size: 10px; color: var(--green); font-weight: bold;">TOTAL SALDO ASLI (INTERNAL BBS)</div>
        <div class="saldo-admin" id="total-bbs">RP 0</div>
    </div>

    <div class="card-saldo">
        <div style="font-size: 11px; color: var(--slate); font-weight: bold; letter-spacing: 0.5px;">SALDO UTAMA (KESELURUHAN)</div>
        <div class="saldo-amount" id="total-rekanan">RP 0</div>
    </div>

    <div class="sub-grid">
        <div class="card-mini">
            <div style="font-size: 10px; color: var(--slate); font-weight: bold; letter-spacing: 0.5px;">MODAL BERJALAN</div>
            <div class="mini-amount txt-normal" id="box-modal-aktif">RP 0</div>
        </div>

        <div class="card-mini">
            <div style="font-size: 10px; color: var(--text); font-weight: bold; letter-spacing: 0.5px;">PROFIT BERSIH BBS</div>
            <div class="mini-amount" id="box-margin-total">RP 0</div>
        </div>
    </div>

    <div style="font-weight:bold; margin-bottom:10px; color:var(--gold); letter-spacing: 0.5px;">RINCIAN TRANSAKSI</div>
    <div class="list-container" id="list-transaksi">
        <p style="text-align:center; color:var(--slate);">Memuat data...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA_wvEsCCOEjiwxui7_pdOrG8-xMBCw3mw",
        authDomain: "barcode-warung-81e97.firebaseapp.com",
        databaseURL: "https://barcode-warung-81e97-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "barcode-warung-81e97",
        appId: "1:1089837830503:web:410644c17a04314e37dfc2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const pathKas = `KAS`;

    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('mode') === 'admin';

    if(isAdmin) {
        document.getElementById('admin-area').style.display = 'block';
    }

    onValue(ref(db, pathKas), (snap) => {
        let akumulasiModal = 0;
        let akumulasiProfit = 0;
        let html = "";
        const data = snap.val();

        if(data) {
            // Urutan log transaksi diurutkan secara kronologis terlebih dahulu (dari terlama ke terbaru) 
            // agar perhitungan pengurangan sisa modal berjalan sesuai urutan waktu masuknya.
            const dataUrutWaktu = Object.values(data);

            dataUrutWaktu.forEach((item) => {
                const isIn = item.tipe === 'IN';
                const nomMurni = item.nominal || 0;
                const ketUpper = (item.keterangan || "").toUpperCase();

                if (isIn) {
                    // JIKA UANG MASUK (IN)
                    if (ketUpper.includes("MODAL")) {
                        // Jika keterangan mengandung kata MODAL, masuk ke kantong Modal
                        akumulasiModal += nomMurni;
                    } else {
                        // Jika tidak ada kata MODAL, otomatis ini Profit hasil penjualan/proyek
                        akumulasiProfit += nomMurni;
                    }
                } else {
                    // JIKA UANG KELUAR (OUT / PENGELUARAN)
                    let sisaPengeluaran = nomMurni;

                    // Langkah 1: Kuras dari kantong Modal terlebih dahulu
                    if (akumulasiModal >= sisaPengeluaran) {
                        akumulasiModal -= sisaPengeluaran;
                        sisaPengeluaran = 0;
                    } else {
                        // Jika modal tidak cukup, kuras habis modal sampai 0
                        sisaPengeluaran -= akumulasiModal;
                        akumulasiModal = 0;
                    }

                    // Langkah 2: Jika masih ada sisa pengeluaran yang belum terbayar, potong dari Profit
                    if (sisaPengeluaran > 0) {
                        akumulasiProfit -= sisaPengeluaran;
                    }
                }
            });

            // Setelah perhitungan selesai, buat render list untuk user (Terbaru di atas)
            [...dataUrutWaktu].reverse().forEach((item) => {
                const isIn = item.tipe === 'IN';
                const nomMurni = item.nominal || 0;
                html += `
                <div class="item-kas">
                    <div>
                        <div class="item-ket">${item.keterangan}</div>
                        <div class="item-tgl">${item.tgl} | ${item.jam}</div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-weight:bold" class="${isIn ? 'nom-in' : 'nom-out'}">
                            ${isIn ? '+' : '-'}${nomMurni.toLocaleString('id-ID')}
                        </div>
                    </div>
                </div>`;
            });
        }
        
        // RUMUS UTAMA: Saldo Utama adalah gabungan Sisa Modal + Sisa Profit Aktif
        const totalSaldoUtama = akumulasiModal + akumulasiProfit;

        // Tampilkan data ke elemen HTML masing-masing
        document.getElementById('total-rekanan').innerText = "RP " + totalSaldoUtama.toLocaleString('id-ID');
        document.getElementById('total-bbs').innerText = "RP " + totalSaldoUtama.toLocaleString('id-ID');
        document.getElementById('box-modal-aktif').innerText = "RP " + akumulasiModal.toLocaleString('id-ID');

        // PENGATURAN BADGE WARNA UNTUK PROFIT BERSIH
        const elemenProfitBox = document.getElementById('box-margin-total');
        if (akumulasiProfit >= 0) {
            elemenProfitBox.innerText = "RP " + akumulasiProfit.toLocaleString('id-ID');
            elemenProfitBox.className = "mini-amount txt-untung";
        } else {
            const nilaiPositifProfit = Math.abs(akumulasiProfit);
            elemenProfitBox.innerText = "RP -" + nilaiPositifProfit.toLocaleString('id-ID');
            elemenProfitBox.className = "mini-amount txt-rugi";
        }

        document.getElementById('list-transaksi').innerHTML = html || "<p style='text-align:center; color:var(--slate); padding:10px;'>Belum ada riwayat</p>";
    });
</script>
</body>
</html>
