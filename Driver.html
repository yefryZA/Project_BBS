        
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBS DRIVER</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0a192f; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #112240; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; border: 1px solid #233554; }
        .logo { width: 100px; height: auto; margin-bottom: 15px; }
        h2 { margin: 0 0 5px 0; font-size: 20px; color: #64ffda; }
        p { margin: 0 0 20px 0; font-size: 12px; color: #8892b0; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; color: #64ffda; font-weight: bold; }
       input { 
    width: 100%; 
    padding: 15px; /* Ditambah biar box input lebih tebal & empuk ditekan */
    background: #0a192f; 
    border: 2px solid #233554; /* Garis border dipertebal */
    border-radius: 8px; 
    color: #fff; 
    outline: none;
    
    /* 🎯 LOGIKA AGAR FONT ARIAL BLACK GEDE & OTOMATIS KAPITAL */
    font-family: 'Arial Black', 'Arial Bold', sans-serif;
    font-size: 22px; /* Ukuran text diperbesar drastis */
    text-transform: uppercase; /* Paksa visual input jadi HURUF BESAR SEMUA */
    letter-spacing: 1px; /* Jarak antar huruf diperlebar sedikit biar mudah dibaca */
    text-align: center; /* Text rata tengah biar makin rapi seperti plat nomor asli */
}
input:focus { 
    border-color: #64ffda; 
    background: #112240; /* Berubah agak terang pas diklik biar sopir tahu kolom mana yg aktif */
}
/* Mengubah warna teks contoh (placeholder) agar tetap proporsional */
input::placeholder {
    font-family: 'Segoe UI', sans-serif; /* Teks contoh pakai font biasa biar gak kepenuhan */
    font-size: 14px; 
    color: #4c5773;
    letter-spacing: 0px;
}
        button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-start { background: #64ffda; color: #0a192f; }
        .btn-start:hover { background: #52d1b2; }
        .btn-stop { background: #ff4d4d; color: #fff; }
        .status-box { background: #233554; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 13px; border-left: 4px solid #64ffda; text-align: left; display: none; }
        .pulse { display: inline-block; width: 10px; height: 10px; background: #64ffda; border-radius: 50%; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    
    /* 🟢 ANIMASI KEDAP-KEDIP HIJAU NEON JOSS */
.pulse {
    display: inline-block;
    width: 10px;
    height: 10px;
    background-color: #00e676; /* Warna Hijau Terang */
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
    position: relative;
    box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7);
    animation: efekKedapKedipHijau 1.6s infinite cubic-bezier(0.66, 0, 0, 1);
}

@keyframes efekKedapKedipHijau {
    0% {
        box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7);
    }
    70% {
        box-shadow: 0 0 0 10px rgba(0, 230, 118, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(0, 230, 118, 0);
    }
}
    </style>
</head>
<body>

<div class="card">
    <img src="https://raw.githubusercontent.com/yefryZA/PT.BBS/main/logo.png" class="logo" alt="Logo BBS">
    <h2>PT. BERKAH BAJA STEEL</h2>
    <p>Project Pengiriman Pasir C.04 Losarang</p>

    <div id="form-area">
        <div class="form-group">
            <label>PLAT NOMOR ARMADA</label>
            <input type="text" id="plat" placeholder="Contoh: E 1234 XF" autocomplete="off">
        </div>
        <div class="form-group">
            <label>NAMA SOPIR</label>
            <input type="text" id="sopir" placeholder="Nama Lengkap Sopir" autocomplete="off">
        </div>
        <button class="btn-start" onclick="mulaiTracking()">DAFTAR ONLINE</button>
    </div>

   <div class="status-box" id="status-box" style="display: block; text-align: left; padding: 15px;">
    <div style="display: flex; align-items: flex-start; gap: 4px;">
        <span class="pulse" style="margin-top: 6px; flex-shrink: 0;"></span> 
        
        <div>
            <b style="font-size: 15px; color: #fff; display: block; line-height: 1.4;">SELAMAT BEKERJA HARI INI</b>
            <span style="color:#8892b0; font-size:11px; display: block; margin-top: 2px;">HATI HATI DIJALAN KESELAMATAN YANG UTAMA</span>
        </div>
    </div>
</div>
    
    <div style="background: #112240; padding: 15px; border-radius: 8px; margin-top: 15px; margin-bottom: 5px; border: 1px dashed #64ffda; text-align: center;">
        <p style="color: #8892b0; margin: 0 0 10px 0; font-size: 13px;">Dokumen Muatan Driver:</p>
        <button id="btn-surat-jalan" onclick="window.bukaSuratJalanDigital()" style="background: #ffb74d; color: #000; font-weight: bold; width: 100%; padding: 14px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
            📁 LIHAT SURAT JALAN DIGITAL (JPG)
        </button>
    </div>

    <div class="form-group" style="margin-top: 20px;">
        <label>PIN ADMIN BBS</label>
        <input type="password" id="pin-input" placeholder="Masukkan PIN" pattern="\d*" inputmode="numeric" style="text-align: center; font-size: 18px; letter-spacing: 5px;">
    </div>
    <button class="btn-stop" onclick="stopTracking()">SELESAI BONGKAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Konfigurasi Firebase PT. BBS
    const firebaseConfig = { 
        apiKey: "AIzaSyAfeLTKRQ66tjZjAt7tg6KcrWhtmv0y3fo", 
        databaseURL: "https://berkah-baja-steel-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "berkah-baja-steel" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbKey = "BBS_PROYEK_SATOE";

    let gpsInterval = null;
    let currentIdTransaksi = "";
    let wakeLock = null;
    let wakeLockBbs = null;
    let audioHeningBbs = null;
    let bbsGpsWatcher = null;

    // 🔒 WAKE LOCK
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('🔒 HP Dipaksa Melek!');
            }
        } catch (err) {
            console.error('❌ Wake Lock error:', err);
        }
    }

    window.addEventListener('load', requestWakeLock);
    document.addEventListener('visibilitychange', () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            requestWakeLock();
        }
    });

    // 🚀 SERVICE WORKER
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js', { scope: './' })
                .then((reg) => console.log('🚀 PWA Aktif!', reg))
                .catch((err) => console.error('❌ PWA Error:', err));
        });
    }

    // 🔥 ANTI-AMNESIA (CEK DATA LAMA)
    window.onload = function() {
        const savedId = localStorage.getItem('bbs_active_id');
        const savedPlat = localStorage.getItem('bbs_active_plat');
        const savedSopir = localStorage.getItem('bbs_active_sopir');
        
        console.log('🔍 Cek memori lama:', savedId);
        
        if (savedId && savedPlat) {
            window.currentIdTransaksi = savedId;
            currentIdTransaksi = savedId;
            
            document.getElementById('plat').value = savedPlat;
            document.getElementById('sopir').value = savedSopir;
            
            document.getElementById('form-area').style.display = 'none';
            document.getElementById('lock-area').style.display = 'block';
            
            console.log('⚡ Melanjutkan tracking:', savedId);
            
            // Update status langsung
            if (db) {
                update(ref(db, `bbs_tracking/${dbKey}/${savedId}`), {
                    waktu_update: Date.now(),
                    status_perjalanan: "MENGIRIM_POSISI"
                }).then(() => console.log('🟢 Status update!'));
            }
            
            // Aktifkan mesin GPS
            aktifkanMesinGPS(savedId);
        }
    };

    // 🎵 AUDIO PANCINGAN
    function pancingAudioGaib() {
        if (!audioHeningBbs) {
            audioHeningBbs = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==");
            audioHeningBbs.loop = true;
            audioHeningBbs.volume = 0.01;
        }
        
        audioHeningBbs.play()
            .then(() => console.log('🎵 Audio aktif'))
            .catch(e => console.warn('Audio error:', e));
    }

    // 🔒 WAKE LOCK v2
    async function jalankanWakeLockBbs() {
        try {
            if ('wakeLock' in navigator) {
                wakeLockBbs = await navigator.wakeLock.request('screen');
                console.log('🔒 Wake Lock v2 aktif!');
                
                wakeLockBbs.addEventListener('release', () => {
                    console.log('⏳ Wake Lock terlepas, mengaktifkan ulang...');
                    jalankanWakeLockBbs();
                });
            }
        } catch (err) {
            console.warn('⚠️ Wake Lock gagal:', err.message);
        }
    }

    // 🎯 MULAI TRACKING
    window.mulaiTracking = async function() {
        const plat = document.getElementById('plat').value.trim().toUpperCase();
        const sopir = document.getElementById('sopir').value.trim();

        if (!plat || !sopir) {
            alert("❌ Isi Plat dan Sopir!");
            return;
        }

        if (!navigator.geolocation) {
            alert("❌ GPS tidak didukung!");
            return;
        }

        // Aktivkan tricks
        pancingAudioGaib();
        jalankanWakeLockBbs();

        // Generate ID
        currentIdTransaksi = "TRACK-" + Date.now();
        
        localStorage.setItem('bbs_active_id', currentIdTransaksi);
        localStorage.setItem('bbs_active_plat', plat);
        localStorage.setItem('bbs_active_sopir', sopir);

        console.log('🎯 Mulai tracking:', currentIdTransaksi);

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;

                console.log('📍 Posisi awal:', lat, lng);

                try {
                    await set(ref(db, `bbs_tracking/${dbKey}/${currentIdTransaksi}`), {
                        id_track: currentIdTransaksi,
                        plat_nomor: plat,
                        nama_sopir: sopir,
                        waktu_mulai: Date.now(),
                        waktu_update: Date.now(),
                        status_perjalanan: "MENGIRIM_POSISI",
                        lat: lat,
                        lng: lng
                    });

                    console.log('✅ Data awal masuk Firebase');

                    document.getElementById('form-area').style.display = 'none';
                    document.getElementById('lock-area').style.display = 'block';

                    // ⭐ AKTIFKAN MESIN GPS CARA 1
                    aktifkanMesinGPS(currentIdTransaksi);

                } catch (e) {
                    console.error('❌ Gagal:', e);
                    alert("❌ Gagal koneksi! Coba lagi.");
                }
            },
            (error) => {
                console.error('GPS Error:', error);
                alert("❌ Nyalakan GPS! Klik 'Allow While Using'");
                localStorage.clear();
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    };

  // ⭐============================================================
// 🔥 FUNGSI MESIN GPS CARA 1: WATCHPOSITION SEKALI SAJA
// ⭐============================================================
function aktifkanMesinGPS(idAktif) {
    if (!navigator.geolocation) {
        console.error('❌ GPS tidak didukung!');
        return;
    }

    const idTarget = idAktif || currentIdTransaksi || localStorage.getItem('bbs_active_id');
    
    if (!idTarget) {
        console.error('🚨 ID kosong!');
        return;
    }

    // 🧹 Bersihkan watcher lama (hanya sekali)
    if (bbsGpsWatcher) {
        console.log('🧹 Membersihkan watcher lama...');
        navigator.geolocation.clearWatch(bbsGpsWatcher);
        bbsGpsWatcher = null;
    }

    // Aktivkan tricks
    jalankanWakeLockBbs();
    pancingAudioGaib();

    console.log('🕵️‍♂️ Mulai watch GPS sekali aja untuk ID:', idTarget);

    // ⭐ WATCHPOSITION CUKUP SEKALI, OTTOMATIS NGIRIM SETIAP ADA PERGERAKAN
    bbsGpsWatcher = navigator.geolocation.watchPosition(
        async (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const acc = position.coords.accuracy;

            console.log(`📍 GPS Ditangkap: ${lat}, ${lng} (akurasi: ${acc}m)`);

            // ✅ PERBAIKAN: Jangan skip karena akurasi, tetap kirim ke Firebase!
            // Karena tracking kendaraan butuh data terus-menerus
            
            try {
                await update(ref(db, `bbs_tracking/${dbKey}/${idTarget}`), {
                    lat: lat,
                    lng: lng,
                    accuracy: acc,
                    waktu_update: Date.now(),
                    status_perjalanan: "MENGIRIM_POSISI"
                });
                console.log('✅ Firebase SUDAH DIUPDATE!');
            } catch (e) {
                console.error('❌ Gagal update:', e);
            }

            // Kirim ke Service Worker
            try {
                if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({
                        type: 'TRACK_GPS_UPDATE',
                        lat: lat,
                        lng: lng,
                        id: idTarget
                    });
                }
            } catch (swErr) {
                // Abaikan kalau SW belum siap
            }

        },
        (error) => {
            console.warn('⚠️ GPS Error:', error.code, error.message);
        },
        {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 10000
        }
    );

    console.log('✅ MESIN GPS AKTIF! Watcher ID:', bbsGpsWatcher);
}
        
    // 🛑 STOP TRACKING
    window.stopTracking = async function() {
        const pin = document.getElementById('pin-input').value.trim();
        
        if (!pin) {
            alert("❌ Masukkan PIN!");
            return;
        }

        try {
            const snapshot = await get(ref(db, `bbs_config/${dbKey}/pin_bongkar`));
            const pinSistem = snapshot.exists() ? snapshot.val().toString().trim() : "2026";

            if (pin !== pinSistem) {
                alert("❌ PIN SALAH!");
                document.getElementById('pin-input').value = "";
                return;
            }

            // Matikan GPS
            if (bbsGpsWatcher) {
                navigator.geolocation.clearWatch(bbsGpsWatcher);
            }

            if (gpsInterval) {
                clearInterval(gpsInterval);
            }

            await update(ref(db, `bbs_tracking/${dbKey}/${currentIdTransaksi}`), {
                status_perjalanan: "SELESAI_BONGKAR",
                waktu_selesai: Date.now()
            });

            localStorage.clear();
            alert("✅ PERJALANAN SELESAI!");
            location.reload();

        } catch (error) {
            console.error('Error:', error);
            alert("❌ Koneksi error!");
        }
    };

    // 📁 BUKA SURAT JALAN
    window.bukaSuratJalanDigital = async function() {
        if (!currentIdTransaksi) {
            alert("❌ ID tidak ditemukan!");
            return;
        }

        try {
            const snapshot = await get(ref(db, `bbs_tracking/${dbKey}/${currentIdTransaksi}`));
            
            if (snapshot.exists()) {
                const data = snapshot.val();
                if (data.link_surat_jalan && data.link_surat_jalan.startsWith("http")) {
                    window.open(data.link_surat_jalan, '_blank');
                } else {
                    alert("⏳ Surat Jalan belum siap!");
                }
            }
        } catch (err) {
            console.error('Error:', err);
            alert("❌ Gagal!");
        }
    };

    // 🎣 PANCINGAN GPS AWAL
    (function pancingIzinGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => console.log("🎣 Izin GPS OK!"),
                (err) => console.warn("🎣 Menunggu izin..."),
                { enableHighAccuracy: false, timeout: 3000 }
            );
        }
    })();
    
    console.log('🚀 Script loaded!');
</script>
</body>
</html>
