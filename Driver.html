        
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBS DRIVER</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0a192f; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #112240; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; border: 1px solid #233554; }
        .logo { width: 100px; height: auto; margin-bottom: 15px; }
        h2 { margin: 0 0 5px 0; font-size: 20px; color: #64ffda; }
        p { margin: 0 0 20px 0; font-size: 12px; color: #8892b0; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; color: #64ffda; font-weight: bold; }
       input { 
    width: 100%; 
    padding: 15px; /* Ditambah biar box input lebih tebal & empuk ditekan */
    background: #0a192f; 
    border: 2px solid #233554; /* Garis border dipertebal */
    border-radius: 8px; 
    color: #fff; 
    outline: none;
    
    /* 🎯 LOGIKA AGAR FONT ARIAL BLACK GEDE & OTOMATIS KAPITAL */
    font-family: 'Arial Black', 'Arial Bold', sans-serif;
    font-size: 22px; /* Ukuran text diperbesar drastis */
    text-transform: uppercase; /* Paksa visual input jadi HURUF BESAR SEMUA */
    letter-spacing: 1px; /* Jarak antar huruf diperlebar sedikit biar mudah dibaca */
    text-align: center; /* Text rata tengah biar makin rapi seperti plat nomor asli */
}
input:focus { 
    border-color: #64ffda; 
    background: #112240; /* Berubah agak terang pas diklik biar sopir tahu kolom mana yg aktif */
}
/* Mengubah warna teks contoh (placeholder) agar tetap proporsional */
input::placeholder {
    font-family: 'Segoe UI', sans-serif; /* Teks contoh pakai font biasa biar gak kepenuhan */
    font-size: 14px; 
    color: #4c5773;
    letter-spacing: 0px;
}
        button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-start { background: #64ffda; color: #0a192f; }
        .btn-start:hover { background: #52d1b2; }
        .btn-stop { background: #ff4d4d; color: #fff; }
        .status-box { background: #233554; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 13px; border-left: 4px solid #64ffda; text-align: left; display: none; }
        .pulse { display: inline-block; width: 10px; height: 10px; background: #64ffda; border-radius: 50%; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    
    /* 🟢 ANIMASI KEDAP-KEDIP HIJAU NEON JOSS */
.pulse {
    display: inline-block;
    width: 10px;
    height: 10px;
    background-color: #00e676; /* Warna Hijau Terang */
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
    position: relative;
    box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7);
    animation: efekKedapKedipHijau 1.6s infinite cubic-bezier(0.66, 0, 0, 1);
}

@keyframes efekKedapKedipHijau {
    0% {
        box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7);
    }
    70% {
        box-shadow: 0 0 0 10px rgba(0, 230, 118, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(0, 230, 118, 0);
    }
}
    </style>
</head>
<body>

<div class="card">
    <img src="https://raw.githubusercontent.com/yefryZA/PT.BBS/main/logo.png" class="logo" alt="Logo BBS">
    <h2>PT. BERKAH BAJA STEEL</h2>
    <p>Project Pengiriman Pasir C.04 Losarang</p>

    <div id="form-area">
        <div class="form-group">
            <label>PLAT NOMOR ARMADA</label>
            <input type="text" id="plat" placeholder="Contoh: E 1234 XF" autocomplete="off">
        </div>
        <div class="form-group">
            <label>NAMA SOPIR</label>
            <input type="text" id="sopir" placeholder="Nama Lengkap Sopir" autocomplete="off">
        </div>
        <button class="btn-start" onclick="mulaiTracking()">DAFTAR ONLINE</button>
    </div>

   <div class="status-box" id="status-box" style="display: block; text-align: left; padding: 15px;">
    <div style="display: flex; align-items: flex-start; gap: 4px;">
        <span class="pulse" style="margin-top: 6px; flex-shrink: 0;"></span> 
        
        <div>
            <b style="font-size: 15px; color: #fff; display: block; line-height: 1.4;">SELAMAT BEKERJA HARI INI</b>
            <span style="color:#8892b0; font-size:11px; display: block; margin-top: 2px;">HATI HATI DIJALAN KESELAMATAN YANG UTAMA</span>
        </div>
    </div>
</div>
    
    <div style="background: #112240; padding: 15px; border-radius: 8px; margin-top: 15px; margin-bottom: 5px; border: 1px dashed #64ffda; text-align: center;">
        <p style="color: #8892b0; margin: 0 0 10px 0; font-size: 13px;">Dokumen Muatan Driver:</p>
        <button id="btn-surat-jalan" onclick="window.bukaSuratJalanDigital()" style="background: #ffb74d; color: #000; font-weight: bold; width: 100%; padding: 14px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
            📁 LIHAT SURAT JALAN DIGITAL (JPG)
        </button>
    </div>

    <div class="form-group" style="margin-top: 20px;">
        <label>PIN ADMIN BBS</label>
        <input type="password" id="pin-input" placeholder="Masukkan PIN" pattern="\d*" inputmode="numeric" style="text-align: center; font-size: 18px; letter-spacing: 5px;">
    </div>
    <button class="btn-stop" onclick="stopTracking()">SELESAI BONGKAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Konfigurasi Firebase PT. BBS
    const firebaseConfig = { 
        apiKey: "AIzaSyAfeLTKRQ66tjZjAt7tg6KcrWhtmv0y3fo", 
        databaseURL: "https://berkah-baja-steel-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "berkah-baja-steel" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbKey = "BBS_PROYEK_SATOE"; // Node Utama Database Proyek Losarang

    let gpsInterval = null;
    let currentIdTransaksi = "";
    let wakeLock = null;

    // 🔒 FUNGSI AWAL: Memaksa sistem HP tetap melek biar GPS tidak tidur
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('🔒 HP Dipaksa Melek, GPS Anti-Mati!');
            }
        } catch (err) {
            console.error('❌ Gagal mengunci sistem melek:', err);
        }
    }

    // Jalankan sistem anti-tidur saat halaman dimuat atau dibuka kembali
    window.addEventListener('load', requestWakeLock);
    document.addEventListener('visibilitychange', () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            requestWakeLock();
        }
    });

    // 🚀 DAFTARKAN SERVICE WORKER FISIK
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js', { scope: './' })
                .then((reg) => console.log('🚀 PWA Driver Resmi Aktif!', reg))
                .catch((err) => console.error('❌ Eror PWA Driver:', err));
        });
    }

   // 🔥 PERBAIKAN SAKTI: Kunci Anti Amnesia Level Global Murni Laptop & HP
    window.onload = function() {
        const savedId = localStorage.getItem('bbs_active_id');
        const savedPlat = localStorage.getItem('bbs_active_plat');
        const savedSopir = localStorage.getItem('bbs_active_sopir');
        
        console.log(`🔍 [BBS SYSTEM] Memeriksa memori lokal... Ditemukan ID: ${savedId}`);
        
        if (savedId && savedPlat) {
            // 🚀 GEBOD GLOBAL: Paksa simpan langsung ke root browser (window.) 
            // agar bisa ditembus oleh modul Firebase import di bawah!
            window.currentIdTransaksi = savedId;
            currentIdTransaksi = savedId; // Amankan dua-duanya biar tidak bentrok
            
            document.getElementById('plat').value = savedPlat;
            document.getElementById('sopir').value = savedSopir;
            
            document.getElementById('form-area').style.display = 'none';
            document.getElementById('lock-area').style.display = 'block';
            
            console.log("⚡ [BBS SYSTEM] Rute aktif terdeteksi! Mengirim tanda kehidupan ke Dashboard...");
            
            // 🔥 TEMBAKAN INSTAN: Detik ini juga, paksa update waktu ke Firebase 
            // biar Dashboard LANGSUNG BERUBAH HIJAU tanpa nunggu satelit GPS lock!
            const { getDatabase, ref, update } = window.BbsFirebaseDatabase || {}; 
            // Amankan jika db sudah siap
            if (db) {
                update(ref(db, `bbs_tracking/${dbKey}/${savedId}`), {
                    waktu_update: Date.now(), // Setor milidetik komputer sekarang
                    status_perjalanan: "MENGIRIM_POSISI"
                }).then(() => console.log("🟢 Status di Dashboard otomatis menyala HIJAU!"));
            }

            // Nyalakan mesin radar berkala
            aktifkanMesinGPS(savedId);
        } else {
            console.log("🟢 [BBS SYSTEM] Memori kosong. Siap menerima input perjalanan baru.");
        }
    }

    // ====== TAMBAHAN ASISTEN INTERNAL: VARIABEL PENGUNCI WAKE LOCK & AUDIO ======
    let wakeLockBbs = null;
    let audioHeningBbs = null;

    // Fungsi Pawang Anti-Tidur (Wake Lock API)
    async function jalankanWakeLockBbs() {
        try {
            if ('wakeLock' in navigator) {
                wakeLockBbs = await navigator.wakeLock.request('screen');
                console.log('🔒 SAKTI: CPU HP Driver dikunci, GPS anti-tidur!');
                
                // Jika kunci terlepas otomatis di tengah jalan, paksa kunci ulang
                wakeLockBbs.addEventListener('release', () => {
                    console.log('⏳ Kunci terlepas otomatis, mengaktifkan ulang pertahanan...');
                    jalankanWakeLockBbs();
                });
            }
        } catch (err) {
            console.warn(`⚠️ Wake Lock gagal aktif (Biasa pada beberapa tipe browser): ${err.message}`);
        }
    }

    // Trik Licik Pancingan Audio Gaib (Menipu sistem hemat baterai Android)
    function pancingAudioGaib() {
        if (!audioHeningBbs) {
            // Menggunakan file audio sunyi/hening base64 berdurasi 1 detik (Aman tanpa kuota)
            audioHeningBbs = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==");
            audioHeningBbs.loop = true;
            audioHeningBbs.volume = 0.01; // Sangat kecil, tidak akan terdengar oleh sopir
        }
        
        audioHeningBbs.play()
            .then(() => console.log('🎵 Musik sunyi BBS aktif! Android mendeteksi aktivitas media background.'))
            .catch(e => console.warn('Pancingan audio butuh interaksi user, otomatis terpicu via tombol klik mulai.'));
    }

    // FUNGSI: MULAI PERJALANAN (VERSI SIDAK GPS SEBELUM TEMBAK FIREBASE)
    window.mulaiTracking = async function() {
        const plat = document.getElementById('plat').value.trim().toUpperCase();
        const sopir = document.getElementById('sopir').value.trim();

        // 1. Validasi Inputan Form (Harus diisi)
        if (!plat || !sopir) {
            alert("❌ Harap isi Plat Nomor dan Nama Sopir lebih dulu!");
            return;
        }

        if (!navigator.geolocation) {
            alert("❌ HP ini tidak mendukung sensor GPS!");
            return;
        }

        // 🎯 KUNCI UTAMA: LANGSUNG GENERATE ID DI SINI (SEBELUM GEOLOCATION BERJALAN)
        currentIdTransaksi = "TRACK-" + Date.now();

        // Kunci status di localStorage (Anti Amnesia)
        localStorage.setItem('bbs_active_id', currentIdTransaksi);
        localStorage.setItem('bbs_active_plat', plat);
        localStorage.setItem('bbs_active_sopir', sopir);

        // 🚀 SEBELUM FIREBASE BERJALAN: Eksekusi Trik Licik Audio Gaib & Wake Lock
        pancingAudioGaib();
        jalankanWakeLockBbs();

        // 🚀 2. SIDAK DADAKAN: Cek apakah GPS aktif dan diizinkan
        navigator.geolocation.getCurrentPosition(async (position) => {
            // === JIKA GPS AKTIF DAN DIIZINKAN ===
            
            let firebaseSukses = false;

            // 🎯 PENYELARAS RUMUS BARBAR: Gunakan Date.now() agar sinkron dengan Dashboard Admin
            try {
                await set(ref(db, `bbs_tracking/${dbKey}/${currentIdTransaksi}`), {
                    id_track: currentIdTransaksi,
                    plat_nomor: plat,
                    nama_sopir: sopir,
                    waktu_mulai: Date.now(), // 🔥 Berubah jadi angka murni (Contoh: 1716300000000)
                    waktu_update: Date.now(), // 🔥 Langsung buat waktu_update di awal biar Dashboard tidak membaca data usang!
                    status_perjalanan: "MENGIRIM_POSISI",
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                });
                
                console.log("🚀 Data awal BERHASIL masuk Firebase!");
                firebaseSukses = true;

            } catch (fbError) {
                console.error("Gagal mengirim data awal ke Firebase:", fbError);
                alert("❌ GAGAL MASUK SISTEM: Koneksi internet Anda tidak stabil/lelet. Silakan klik MULAI lagi!");
                return; // Stop proses jika Firebase benar-benar gagal
            }

            // 🎯 ISOLASI 2: Jika Firebase terbukti sukses, baru eksekusi perubahan layar & radar berkala
            if (firebaseSukses) {
                // Ubah tampilan web, langsung sembunyikan form input
                document.getElementById('form-area').style.display = 'none';
                document.getElementById('lock-area').style.display = 'block';

                // Hidupkan radar GPS berkala dengan pelindung internal agar tidak memicu alert atas
                try {
                    aktifkanMesinGPS(currentIdTransaksi);
                } catch (radarError) {
                    console.error("Radar berkala ada kendala minor, tapi data awal aman:", radarError);
                }
            }

        }, (error) => {
            // === JIKA GPS MATI ATAU SOPIR KLIK TOLAK ===
            localStorage.clear();
            currentIdTransaksi = "";
            
            // Matikan pancingan audio jika gagal masuk sistem
            if (audioHeningBbs) { audioHeningBbs.pause(); }
            
            alert("❌ PENDAFTARAN ANDA DITOLAK!\n\nKLIK ⟪ Izinkan GPS atau Allow While Using App ⟫\n\nSilahkan kembali ke menu Awal");
            console.warn("klik dulu ⟪ ALLOW WHILE USING APP ⟫, silahkan coba lagi.");
        }, {
            enableHighAccuracy: true,
            timeout: 7000
        });
    };

    function aktifkanMesinGPS(idAktif) {
        if (!navigator.geolocation) {
            return;
        }

        // Kunci idTarget di tingkat paling atas fungsi agar bisa dibaca oleh watchPosition di bawahnya
        const idTarget = idAktif || currentIdTransaksi || localStorage.getItem('bbs_active_id');

        // Panggil fungsi Wake Lock & Audio agar browser tetap melek mengintip GPS
        jalankanWakeLockBbs();
        pancingAudioGaib();

        if (!idTarget) {
            console.error("🚨 Radar Batal: ID Transaksi kosong!");
            return;
        }

        // 🕒 FUNGSI INTERNAL: Mengaktifkan mode mata-mata watchPosition
        async function kirimKoordinatKeSistem() {
            // Membersihkan sisa tracker lama jika ada agar tidak bentrok di memori RAM HP
            if (window.bbsGpsWatcher) {
                navigator.geolocation.clearWatch(window.bbsGpsWatcher);
            }

            console.log("🕵️‍♂️ Mode Mata-Mata GPS BBS Aktif... Menunggu sensor HP menyetor angka...");

            window.bbsGpsWatcher = navigator.geolocation.watchPosition(async (position) => {
                const latitude = position.coords.latitude;
                const longitude = position.coords.longitude;

                console.log(`🎯 GPS Berhasil Ditangkap Otomatis: ${latitude}, ${longitude}`);

                try {
                    // 🚀 1. Kiriman Utama ke Firebase SDK dengan idTarget yang sudah pasti aman
                await update(ref(db, `bbs_tracking/${dbKey}/${idTarget}`), {
                            lat: latitude,
                            lng: longitude,
                            waktu_update: Date.now() // 🔥 Ganti jadi ini! Hasilnya nanti angka murni (contoh: 1716300000000)
                        });
                        
                    console.log("📡 Radar Otomatis: Koordinat Sukses Terkirim ke Firebase!");
                } catch (errFb) {
                    console.error("Gagal kirim update koordinat berkala ke Firebase:", errFb);
                }

                // 📡 2. JEMBATAN SILUMAN ke sw.js
                try {
                    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                        navigator.serviceWorker.controller.postMessage({
                            type: 'TRACK_GPS_BACKGROUND',
                            latitude: latitude,
                            longitude: longitude,
                            dbPath: `bbs_tracking/${dbKey}/${idTarget}`
                        });
                    }
                } catch (swErr) {
                    console.warn("⏳ Service Worker belum siap menerima background message, dilewati aman.");
                }

            }, (error) => {
                console.warn("⏳ Sensor HP driver masih mencari celah satelit di jalan...", error.message);
                
                if (idTarget) {
                    update(ref(db, `bbs_tracking/${dbKey}/${idTarget}`), {
                        koordinat_txt: "⚠️ GPS SENGAJA DIMATIKAN DRIVER"
                    }).catch(e => console.error(e));
                }
            }, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 20000
            });
        }

        // ======================================================================
        // 🔥 UPGRADE BERUNTUN: PEMANASAN GPS BERUNTUN DI AWAL PERJALANAN
        // ======================================================================
        
        if (gpsInterval) clearInterval(gpsInterval);

        // 1. Tembakan Instan Pertama (Langsung panggil watchPosition)
        kirimKoordinatKeSistem();

        // 2. Tembak Beruntun Tiap 10 Detik Selama 1 Menit Pertama
        let hitungPemanasan = 0;
        let gpsPemanasanInterval = setInterval(() => {
            hitungPemanasan++;
            console.log(`📡 Tembakan Pemanasan GPS ke-${hitungPemanasan}...`);
            kirimKoordinatKeSistem();
            
            if (hitungPemanasan >= 6) {
                clearInterval(gpsPemanasanInterval);
                console.log("🎯 Pemanasan Selesai! Sensor GPS masuk ke mode hemat 10 menitan.");
                
                // 3. Masuk ke Mode Normal per 10 menit
                gpsInterval = setInterval(kirimKoordinatKeSistem, 10 * 60 * 1000);
            }
        }, 10 * 1000);
    }
    // FUNGSI: TOMBOL SELESAI (Kunci Bongkar via PIN Dashboard)
    window.stopTracking = async function() {
        const inputPin = document.getElementById('pin-input').value.trim();

        if (!inputPin) {
            alert("❌ Masukkan PIN Kunci Bongkar terlebih dahulu!");
            return;
        }

        try {
            const snapshot = await get(ref(db, `bbs_config/${dbKey}/pin_bongkar`));
            const pinSistem = snapshot.exists() ? snapshot.val().toString().trim() : "2026";

            if (inputPin !== pinSistem) {
                alert("❌ PIN SALAH! Koordinat Anda tetap dipantau. Silakan minta PIN ke Petugas Pos Bongkar.");
                document.getElementById('pin-input').value = "";
                return;
            }

            // Bersihkan watchPosition pelacak GPS agar berhenti total
            if (window.bbsGpsWatcher) {
                navigator.geolocation.clearWatch(window.bbsGpsWatcher);
            }

            if (gpsInterval) {
                clearInterval(gpsInterval); 
            }

            await update(ref(db, `bbs_tracking/${dbKey}/${currentIdTransaksi}`), {
                status_perjalanan: "SELESAI_BONGKAR",
                waktu_selesai: new Date().toISOString()
            });

            localStorage.clear();

            alert("✅ PERJALANAN SELESAI! Terima kasih Pak Sopir, amanah sudah sampai tujuan.");
            location.reload();

        } catch (error) {
            console.error("Gagal membaca PIN dari server:", error);
            alert("❌ KONEKSI ERROR: Gagal memvalidasi PIN ke server. Coba lagi!");
        }
    };
        
    // 📁 FUNGSI GLOBAL: MEMBUKA SURAT JALAN DARI KANTOR (PSIKOLOGI KAMUFLASE)
    window.bukaSuratJalanDigital = async function() {
        if (!currentIdTransaksi) {
            alert("❌ ID Pelacakan tidak ditemukan!");
            return;
        }

        try {
            const snapshot = await get(ref(db, `bbs_tracking/${dbKey}/${currentIdTransaksi}`));
            
            if (snapshot.exists()) {
                const dataPerjalanan = snapshot.val();
                if (dataPerjalanan.link_surat_jalan && dataPerjalanan.link_surat_jalan.startsWith("http")) {
                    window.open(dataPerjalanan.link_surat_jalan, '_blank');
                } else {
                    alert("⏳ SURAT JALAN BELUM SIAP!\n\nPetugas kantor sedang menyiapkan dokumen JPG Surat Jalan Anda. Silakan coba klik tombol ini beberapa saat lagi!");
                }
            } else {
                alert("❌ Surat Jalan Belum diterbitkan..");
            }
        } catch (err) {
            console.error("Gagal memuat surat jalan:", err);
            alert("❌ Koneksi internet lelet. Gagal membuka dokumen, coba lagi!");
        }
    };

    (function pancingIzinGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => { console.log("🎣 Pancingan Sukses: Izin GPS aman aktif!"); },
                (err) => { console.warn("🎣 Pancingan Siap: Menunggu user mengaktifkan izin."); },
                { enableHighAccuracy: false, timeout: 3000 }
            );
        }
    })();
    
</script>
</body>
</html>
