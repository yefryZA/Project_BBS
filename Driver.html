<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Konfigurasi Firebase PT. BBS
    const firebaseConfig = { 
        apiKey: "AIzaSyAfeLTKRQ66tjZjAt7tg6KcrWhtmv0y3fo", 
        databaseURL: "https://berkah-baja-steel-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "berkah-baja-steel" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbKey = "BBS_PROYEK_SATOE";

    let gpsInterval = null;
    let currentIdTransaksi = "";
    let wakeLock = null;
    let wakeLockBbs = null;
    let audioHeningBbs = null;
    let bbsGpsWatcher = null;

    // 🔒 WAKE LOCK
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('🔒 HP Dipaksa Melek!');
            }
        } catch (err) {
            console.error('❌ Wake Lock error:', err);
        }
    }

    window.addEventListener('load', requestWakeLock);
    document.addEventListener('visibilitychange', () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            requestWakeLock();
        }
    });

    // 🚀 SERVICE WORKER
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js', { scope: './' })
                .then((reg) => console.log('🚀 PWA Aktif!', reg))
                .catch((err) => console.error('❌ PWA Error:', err));
        });
    }

    // 🔥 ANTI-AMNESIA (CEK DATA LAMA)
    window.onload = function() {
        const savedId = localStorage.getItem('bbs_active_id');
        const savedPlat = localStorage.getItem('bbs_active_plat');
        const savedSopir = localStorage.getItem('bbs_active_sopir');
        
        console.log('🔍 Cek memori lama:', savedId);
        
        if (savedId && savedPlat) {
            window.currentIdTransaksi = savedId;
            currentIdTransaksi = savedId;
            
            document.getElementById('plat').value = savedPlat;
            document.getElementById('sopir').value = savedSopir;
            
            document.getElementById('form-area').style.display = 'none';
            document.getElementById('lock-area').style.display = 'block';
            
            console.log('⚡ Melanjutkan tracking:', savedId);
            
            // Update status langsung
            if (db) {
                update(ref(db, `bbs_tracking/${dbKey}/${savedId}`), {
                    waktu_update: Date.now(),
                    status_perjalanan: "MENGIRIM_POSISI"
                }).then(() => console.log('🟢 Status update!'));
            }
            
            // Aktifkan mesin GPS
            aktifkanMesinGPS(savedId);
        }
    };

    // 🎵 AUDIO PANCINGAN
    function pancingAudioGaib() {
        if (!audioHeningBbs) {
            audioHeningBbs = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==");
            audioHeningBbs.loop = true;
            audioHeningBbs.volume = 0.01;
        }
        
        audioHeningBbs.play()
            .then(() => console.log('🎵 Audio aktif'))
            .catch(e => console.warn('Audio error:', e));
    }

    // 🔒 WAKE LOCK v2
    async function jalankanWakeLockBbs() {
        try {
            if ('wakeLock' in navigator) {
                wakeLockBbs = await navigator.wakeLock.request('screen');
                console.log('🔒 Wake Lock v2 aktif!');
                
                wakeLockBbs.addEventListener('release', () => {
                    console.log('⏳ Wake Lock terlepas, mengaktifkan ulang...');
                    jalankanWakeLockBbs();
                });
            }
        } catch (err) {
            console.warn('⚠️ Wake Lock gagal:', err.message);
        }
    }

    // 🎯 MULAI TRACKING
    window.mulaiTracking = async function() {
        const plat = document.getElementById('plat').value.trim().toUpperCase();
        const sopir = document.getElementById('sopir').value.trim();

        if (!plat || !sopir) {
            alert("❌ Isi Plat dan Sopir!");
            return;
        }

        if (!navigator.geolocation) {
            alert("❌ GPS tidak didukung!");
            return;
        }

        // Aktivkan tricks
        pancingAudioGaib();
        jalankanWakeLockBbs();

        // Generate ID
        currentIdTransaksi = "TRACK-" + Date.now();
        
        localStorage.setItem('bbs_active_id', currentIdTransaksi);
        localStorage.setItem('bbs_active_plat', plat);
        localStorage.setItem('bbs_active_sopir', sopir);

        console.log('🎯 Mulai tracking:', currentIdTransaksi);

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;

                console.log('📍 Posisi awal:', lat, lng);

                try {
                    await set(ref(db, `bbs_tracking/${dbKey}/${currentIdTransaksi}`), {
                        id_track: currentIdTransaksi,
                        plat_nomor: plat,
                        nama_sopir: sopir,
                        waktu_mulai: Date.now(),
                        waktu_update: Date.now(),
                        status_perjalanan: "MENGIRIM_POSISI",
                        lat: lat,
                        lng: lng
                    });

                    console.log('✅ Data awal masuk Firebase');

                    document.getElementById('form-area').style.display = 'none';
                    document.getElementById('lock-area').style.display = 'block';

                    // ⭐ AKTIFKAN MESIN GPS CARA 1
                    aktifkanMesinGPS(currentIdTransaksi);

                } catch (e) {
                    console.error('❌ Gagal:', e);
                    alert("❌ Gagal koneksi! Coba lagi.");
                }
            },
            (error) => {
                console.error('GPS Error:', error);
                alert("❌ Nyalakan GPS! Klik 'Allow While Using'");
                localStorage.clear();
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    };

    // ⭐============================================================
    // 🔥 FUNGSI MESIN GPS CARA 1: WATCHPOSITION SEKALI SAJA
    // ⭐============================================================
    function aktifkanMesinGPS(idAktif) {
        if (!navigator.geolocation) {
            console.error('❌ GPS tidak didukung!');
            return;
        }

        const idTarget = idAktif || currentIdTransaksi || localStorage.getItem('bbs_active_id');
        
        if (!idTarget) {
            console.error('🚨 ID kosong!');
            return;
        }

        // 🧹 Bersihkan watcher lama (hanya sekali)
        if (bbsGpsWatcher) {
            console.log('🧹 Membersihkan watcher lama...');
            navigator.geolocation.clearWatch(bbsGpsWatcher);
            bbsGpsWatcher = null;
        }

        // Aktivkan tricks
        jalankanWakeLockBbs();
        pancingAudioGaib();

        console.log('🕵️‍♂️ Mulai watch GPS sekali saja untuk ID:', idTarget);

        // ⭐ WATCHPOSITION CUKUP SEKALI, OTTOMATIS NGIRIM SETIAP ADA PERGERAKAN
        bbsGpsWatcher = navigator.geolocation.watchPosition(
            async (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const acc = position.coords.accuracy;

                console.log(`📍 GPS Ditangkap: ${lat}, ${lng} (akurasi: ${acc}m)`);

                // Skip kalau akurasi jelek (>50m)
                if (acc > 50) {
                    console.warn('⏭️ Akurasi jelek, skip!');
                    return;
                }

                try {
                    await update(ref(db, `bbs_tracking/${dbKey}/${idTarget}`), {
                        lat: lat,
                        lng: lng,
                        waktu_update: Date.now(),
                        status_perjalanan: "MENGIRIM_POSISI"
                    });
                    console.log('✅ Firebase SUDAH DIUPDATE!');
                } catch (e) {
                    console.error('❌ Gagal update:', e);
                }

                // Kirim ke Service Worker
                try {
                    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                        navigator.serviceWorker.controller.postMessage({
                            type: 'TRACK_GPS_UPDATE',
                            lat: lat,
                            lng: lng,
                            id: idTarget
                        });
                    }
                } catch (swErr) {
                    // Abaikan kalau SW belum siap
                }

            },
            (error) => {
                console.warn('⚠️ GPS Error:', error.message);
            },
            {
                enableHighAccuracy: true,
                maximumAge: 5000,
                timeout: 30000
            }
        );

        console.log('✅ MESIN GPS AKTIF! Watcher ID:', bbsGpsWatcher);
    }

    // 🛑 STOP TRACKING
    window.stopTracking = async function() {
        const pin = document.getElementById('pin-input').value.trim();
        
        if (!pin) {
            alert("❌ Masukkan PIN!");
            return;
        }

        try {
            const snapshot = await get(ref(db, `bbs_config/${dbKey}/pin_bongkar`));
            const pinSistem = snapshot.exists() ? snapshot.val().toString().trim() : "2026";

            if (pin !== pinSistem) {
                alert("❌ PIN SALAH!");
                document.getElementById('pin-input').value = "";
                return;
            }

            // Matikan GPS
            if (bbsGpsWatcher) {
                navigator.geolocation.clearWatch(bbsGpsWatcher);
            }

            if (gpsInterval) {
                clearInterval(gpsInterval);
            }

            await update(ref(db, `bbs_tracking/${dbKey}/${currentIdTransaksi}`), {
                status_perjalanan: "SELESAI_BONGKAR",
                waktu_selesai: Date.now()
            });

            localStorage.clear();
            alert("✅ PERJALANAN SELESAI!");
            location.reload();

        } catch (error) {
            console.error('Error:', error);
            alert("❌ Koneksi error!");
        }
    };

    // 📁 BUKA SURAT JALAN
    window.bukaSuratJalanDigital = async function() {
        if (!currentIdTransaksi) {
            alert("❌ ID tidak ditemukan!");
            return;
        }

        try {
            const snapshot = await get(ref(db, `bbs_tracking/${dbKey}/${currentIdTransaksi}`));
            
            if (snapshot.exists()) {
                const data = snapshot.val();
                if (data.link_surat_jalan && data.link_surat_jalan.startsWith("http")) {
                    window.open(data.link_surat_jalan, '_blank');
                } else {
                    alert("⏳ Surat Jalan belum siap!");
                }
            }
        } catch (err) {
            console.error('Error:', err);
            alert("❌ Gagal!");
        }
    };

    // 🎣 PANCINGAN GPS AWAL
    (function pancingIzinGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => console.log("🎣 Izin GPS OK!"),
                (err) => console.warn("🎣 Menunggu izin..."),
                { enableHighAccuracy: false, timeout: 3000 }
            );
        }
    })();
    
    console.log('🚀 Script loaded!');
</script>
</body>
</html>
