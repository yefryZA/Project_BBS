<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBS Admin - Direct Project Input</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #050A1A; color: white; font-family: 'Poppins', sans-serif; text-align: center; padding: 20px; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .form-box { background: #0A192F; border: 2px solid #D4AF37; padding: 30px; border-radius: 20px; max-width: 380px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
        h2 { font-family: 'Cinzel', serif; color: #D4AF37; margin-bottom: 5px; font-size: 18px; text-transform: uppercase; }
        p { font-size: 10px; color: #FDFDD0; opacity: 0.7; margin-bottom: 25px; letter-spacing: 1px; }
        .label-input { text-align: left; display: block; font-size: 10px; color: #D4AF37; margin-bottom: 5px; margin-left: 5px; font-weight: bold; text-transform: uppercase; }
        
        input { 
            width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 8px; 
            border: 1px solid rgba(212, 175, 55, 0.3); background: rgba(255,255,255,0.05); 
            color: white; box-sizing: border-box; outline: none; font-size: 16px; transition: 0.3s;
        }
        
        input:focus { border-color: #D4AF37; background: rgba(255,255,255,0.1); }
        .btn-input { width: 100%; padding: 15px; background: linear-gradient(45deg, #D4AF37, #FDFDD0); color: black; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-family: 'Cinzel', serif; font-size: 14px; transition: 0.3s; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .btn-input:active { transform: scale(0.95); }
        .btn-input:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 11px; color: #D4AF37; font-weight: 600; min-height: 15px; }
        
        /* Badge Proyek Aktif */
        .project-badge { background: rgba(212, 175, 55, 0.1); border: 1px dashed #D4AF37; padding: 8px; border-radius: 5px; margin-bottom: 20px; font-size: 12px; font-weight: bold; color: #FDFDD0; }
    </style>
</head>
<body>

    <div class="form-box">
        <h2>INPUT OPERASIONAL</h2>
        <p id="display-nama-pt">SINKRONISASI...</p>
        
        <div class="project-badge">
            STATUS: BRANKAS AKTIF 🔒
        </div>

        <label class="label-input">RINCIAN KERJA / BARANG</label>
        <input type="text" id="desc" placeholder="Contoh: SOLAR, MAKAN DRIVER">
        
        <label class="label-input">NOMINAL PENGELUARAN (RP)</label>
        <input type="text" id="cost_display" placeholder="Rp 0" oninput="formatRupiah(this)">
        
        <button class="btn-input" id="btnSubmit" onclick="submitToFirebase()">INPUT DATA! 🚀</button>
        <div id="status"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAfeLTKRQ66tjZjAt7tg6KcrWhtmv0y3fo",
        databaseURL: "https://berkah-baja-steel-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "berkah-baja-steel",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ==========================================
    // BAGIAN YANG HARUS DIGANTI SAAT KLONING:
    // ==========================================
    const proyekID = "Marunda"; // Ganti: "Marunda", "Cilegon", atau "IKN"
    const proyekNama = "PT. SAM (MARUNDA)"; // Nama yang tampil di atas
    // ==========================================

    window.onload = () => {
        document.getElementById('display-nama-pt').innerText = proyekNama;
    };

    window.formatRupiah = function(elemen) {
        let val = elemen.value.replace(/\D/g, ''); 
        if (val === "") { elemen.value = ""; return; }
        elemen.value = new Intl.NumberFormat('id-ID').format(val);
    }

    window.submitToFirebase = function() {
        const desc = document.getElementById('desc').value;
        const costRaw = document.getElementById('cost_display').value.replace(/\./g, '');
        const btn = document.getElementById('btnSubmit');
        const status = document.getElementById('status');

        if(!desc || !costRaw) { alert("Data masih kosong, Bos!"); return; }

        btn.disabled = true;
        status.innerText = "⏳ Mengirim data ke " + proyekID + "...";

        // JALUR SAKTI SINKRON KE DASHBOARD
        const dbRef = ref(db, `projects/${proyekID}/operasional`);
        const newRef = push(dbRef);

        set(newRef, {
            tgl: new Date().toLocaleDateString('id-ID', {day:'2-digit', month:'2-digit'}),
            desc: desc.toUpperCase(),
            cost: Number(costRaw)
        })
        .then(() => {
            status.innerText = "✅ MASUK BRANKAS " + proyekID + "!";
            alert("SUKSES! Data sudah sinkron ke Monitoring.");
            document.getElementById('desc').value = '';
            document.getElementById('cost_display').value = '';
            setTimeout(() => { status.innerText = ""; }, 3000);
        })
        .catch((error) => {
            alert("Gagal Bos! Cek sinyal. Error: " + error.message);
            status.innerText = "❌ ERROR!";
        })
        .finally(() => {
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
