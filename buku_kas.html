<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIEWER - KAS BERSAMA</title>
    <style>
        :root { --dark: #0a192f; --light-dark: #112240; --gold: #ffb400; --green: #2ecc71; --red: #e74c3c; --text: #ccd6f6; --slate: #8892b0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        
        .card-saldo { background: var(--light-dark); padding: 25px 20px; border-radius: 25px; text-align: center; border: 1px solid rgba(255, 180, 0, 0.2); margin-bottom: 15px; border-top: 5px solid var(--gold); }
        .card-margin { background: var(--light-dark); padding: 20px; border-radius: 22px; text-align: center; border: 1px dashed rgba(255, 255, 255, 0.1); margin-bottom: 25px; }
        
        #admin-area { display: none; background: #1d3557; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--green); text-align: center; }
        
        .saldo-amount { font-size: 36px; font-weight: bold; color: var(--gold); margin: 5px 0; }
        .margin-amount { font-size: 30px; font-weight: bold; margin: 5px 0; }
        .saldo-admin { font-size: 26px; font-weight: bold; color: var(--green); }
        
        .list-container { background: var(--light-dark); border-radius: 20px; padding: 15px; border: 1px solid #233554; }
        .item-kas { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #233554; }
        .item-ket { font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .item-tgl { font-size: 10px; color: var(--slate); }
        .nom-in { color: var(--green); }
        .nom-out { color: var(--red); }
        
        .txt-untung { color: var(--green) !important; }
        .txt-rugi { color: var(--red) !important; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center; color:var(--gold); letter-spacing: 1px;">MONITORING KAS</h2>

    <div id="admin-area">
        <div style="font-size: 10px; color: var(--green); font-weight: bold;">TOTAL SALDO ASLI (INTERNAL BBS)</div>
        <div class="saldo-admin" id="total-bbs">RP 0</div>
    </div>

    <div class="card-saldo">
        <div style="font-size: 12px; color: var(--slate); font-weight: bold;">SALDO SAAT INI</div>
        <div class="saldo-amount" id="total-rekanan">RP 0</div>
    </div>

    <!-- BOX MARGIN: Hasil Jual dikurangi Belanja Belanja -->
    <div class="card-margin">
        <div style="font-size: 12px; color: var(--text); font-weight: bold; letter-spacing: 0.5px;">AKUMULASI MARGIN BBS</div>
        <div class="margin-amount" id="box-margin-total">RP 0</div>
    </div>

    <div style="font-weight:bold; margin-bottom:10px; color:var(--gold); letter-spacing: 0.5px;">RINCIAN TRANSAKSI</div>
    <div class="list-container" id="list-transaksi">
        <p style="text-align:center; color:var(--slate);">Memuat data...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA_wvEsCCOEjiwxui7_pdOrG8-xMBCw3mw",
        authDomain: "barcode-warung-81e97.firebaseapp.com",
        databaseURL: "https://barcode-warung-81e97-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "barcode-warung-81e97",
        appId: "1:1089837830503:web:410644c17a04314e37dfc2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const pathKas = `BUKU_KAS`;

    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('mode') === 'admin';

    if(isAdmin) {
        document.getElementById('admin-area').style.display = 'block';
    }

    onValue(ref(db, pathKas), (snap) => {
        let totalSaldo = 0; 
        let totalHasilJual = 0;
        let totalBelanja = 0;
        let html = "";
        const data = snap.val();

        if(data) {
            // Urutan terbalik (Terbaru di atas untuk tampilan layar HP)
            Object.values(data).reverse().forEach((item) => {
                const isIn = item.tipe === 'IN';
                const nomMurni = item.nominal || 0;
                const ketUpper = (item.keterangan || "").toUpperCase();

                // 1. Kalkulasi Saldo Utama Berjalan
                totalSaldo += isIn ? nomMurni : -nomMurni;

                // 2. LOGIKA BARU AKUMULASI MODAL & MARGIN
                if (!isIn) {
                    // Semua yang OUT otomatis masuk hitungan modal Belanja
                    totalBelanja += nomMurni;
                } else {
                    // Cek apakah ada kata "MODAL" di dalam keterangan transaksi
                    if (ketUpper.includes("MODAL")) {
                        // Jika ada kata MODAL, otomatis dia berakumulasi ke modal awal (diabaikan dari hasil jual)
                    } else {
                        // Jika tidak ada kata MODAL, berarti ini murni hasil penjualan barang/termin proyek
                        totalHasilJual += nomMurni;
                    }
                }

                html += `
                <div class="item-kas">
                    <div>
                        <div class="item-ket">${item.keterangan}</div>
                        <div class="item-tgl">${item.tgl} | ${item.jam}</div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-weight:bold" class="${isIn ? 'nom-in' : 'nom-out'}">
                            ${isIn ? '+' : '-'}${nomMurni.toLocaleString('id-ID')}
                        </div>
                    </div>
                </div>`;
            });
        }
        
        // RUMUS AKURAT: Hasil Jual Proyek - Modal Belanja Lapangan
        const hitungMarginBBS = totalHasilJual - totalBelanja;
        const elemenMarginBox = document.getElementById('box-margin-total');

        // ATURAN WARNA DAN TANDA MINUS BOS YEFRY
        if (hitungMarginBBS >= 0) {
            // Jika untung: Warna HIJAU, bersih tanpa tanda +
            elemenMarginBox.innerText = "RP " + hitungMarginBBS.toLocaleString('id-ID');
            elemenMarginBox.className = "margin-amount txt-untung";
        } else {
            // Jika minus/rugi: Warna MERAH, otomatis pakai tanda minus (-)
            const nilaiPositif = Math.abs(hitungMarginBBS);
            elemenMarginBox.innerText = "RP -" + nilaiPositif.toLocaleString('id-ID');
            elemenMarginBox.className = "margin-amount txt-rugi";
        }

        // Tampilkan Saldo Akhir Berjalan saat ini
        document.getElementById('total-rekanan').innerText = "RP " + totalSaldo.toLocaleString('id-ID');
        document.getElementById('total-bbs').innerText = "RP " + totalSaldo.toLocaleString('id-ID');
        document.getElementById('list-transaksi').innerHTML = html || "<p style='text-align:center; color:var(--slate); padding:10px;'>Belum ada riwayat</p>";
    });
</script>
</body>
</html>
