<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS PROJECT RIZAL</title>
    <style>
        :root { --dark: #155e08; --light-dark: #112240; --gold: #ffb400; --green: #2ecc71; --red: #e74c3c; --text: #ccd6f6; --slate: #8892b0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        
        .card-saldo { background: var(--light-dark); padding: 30px 20px; border-radius: 25px; text-align: center; border: 1px solid rgba(255, 180, 0, 0.2); margin-bottom: 25px; border-top: 5px solid var(--gold); }
        
        /* Area Rahasia BBS */
        #admin-area { display: none; background: #1d3557; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--green); text-align: center; }
        
        .saldo-amount { font-size: 38px; font-weight: bold; color: var(--gold); margin: 10px 0; }
        .saldo-admin { font-size: 28px; font-weight: bold; color: var(--green); }
        
        .list-container { background: var(--light-dark); border-radius: 20px; padding: 15px; border: 1px solid #233554; }
        .item-kas { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #233554; }
        .item-ket { font-size: 13px; font-weight: bold; }
        .item-tgl { font-size: 10px; color: var(--slate); }
        .nom-in { color: var(--green); }
        .nom-out { color: var(--red); }
        .admin-only { display: none; font-size: 9px; color: var(--green); margin-top: 4px; font-style: italic; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center; color:var(--gold);">MONITORING KAS</h2>

    <div id="admin-area">
        <div style="font-size: 10px; color: var(--green); font-weight: bold;">TOTAL SALDO ASLI (INTERNAL BBS)</div>
        <div class="saldo-admin" id="total-bbs">RP 0</div>
    </div>

    <div class="card-saldo">
        <div style="font-size: 12px; color: var(--slate);">SALDO SAAT INI</div>
        <div class="saldo-amount" id="total-rekanan">RP 0</div>
    </div>

    <div style="font-weight:bold; margin-bottom:10px; color:var(--gold);">RINCIAN TRANSAKSI</div>
    <div class="list-container" id="list-transaksi">
        <p style="text-align:center; color:var(--slate);">Memuat data...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA_wvEsCCOEjiwxui7_pdOrG8-xMBCw3mw",
        authDomain: "barcode-warung-81e97.firebaseapp.com",
        databaseURL: "https://barcode-warung-81e97-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "barcode-warung-81e97",
        appId: "1:1089837830503:web:410644c17a04314e37dfc2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const pathKas = `SALDO_BERSAMA`;

    onValue(ref(db, pathKas), (snap) => {
        let akumulasiModal = 0;
        let akumulasiProfit = 0;
        let akumulasiKasbon = 0;
        let html = "";
        const data = snap.val();

        if(data) {
            const dataUrutWaktu = Object.values(data);

            // Bersihkan flag penanda kecocokan riwayat
            dataUrutWaktu.forEach(d => { if(d.sudahDipakai) delete d.sudahDipakai; });

            dataUrutWaktu.forEach((item, i) => {
                const isIn = item.tipe === 'IN';
                const nomMurni = item.nominal || 0;
                const ketUpper = (item.keterangan || "").toUpperCase();

                const isModalAwal = isIn && ketUpper.includes("MODAL");
                const isKasbon = !isIn && ketUpper.includes("KASBON");
                const isUangJalanKiriman = !isIn && ketUpper.includes("KIRIMAN");
                const isBayarKiriman = isIn && ketUpper.includes("BAYAR") && ketUpper.includes("KIRIMAN");

                if (isModalAwal) {
                    akumulasiModal += nomMurni;
                } else if (isKasbon) {
                    akumulasiKasbon += nomMurni;
                } else if (isUangJalanKiriman) {
                    // Truk jalan langsung potong modal utama murni
                    akumulasiModal -= nomMurni;
                } else if (isBayarKiriman) {
                    let modalPasangan = 0;
                    const matchBayar = ketUpper.match(/(?:BAYAR\s+)?KIRIMAN\s+([A-Z0-9]+)/);
                    const wilayahBayar = matchBayar ? matchBayar[1] : null;

                    if (wilayahBayar) {
                        let indeksPasangan = -1;

                        // STRATEGI 1: Cari pengeluaran modal yang nominalnya persis sama (Klop)
                        for (let j = 0; j < i; j++) {
                            const itemLama = dataUrutWaktu[j];
                            const ketLamaUpper = (itemLama.keterangan || "").toUpperCase();
                            if (itemLama.tipe === 'OUT' && ketLamaUpper.includes("KIRIMAN") && ketLamaUpper.includes(wilayahBayar) && !itemLama.sudahDipakai) {
                                if (itemLama.nominal === nomMurni) {
                                    indeksPasangan = j;
                                    break;
                                }
                            }
                        }

                        // STRATEGI 2: Jika tidak ada nominal yang sama, ambil urutan paling atas yang tersisa
                        if (indeksPasangan === -1) {
                            for (let j = 0; j < i; j++) {
                                const itemLama = dataUrutWaktu[j];
                                const ketLamaUpper = (itemLama.keterangan || "").toUpperCase();
                                if (itemLama.tipe === 'OUT' && ketLamaUpper.includes("KIRIMAN") && ketLamaUpper.includes(wilayahBayar) && !itemLama.sudahDipakai) {
                                    indeksPasangan = j;
                                    break;
                                }
                            }
                        }

                        // Jika ketemu jodoh kirimannya
                        if (indeksPasangan !== -1) {
                            modalPasangan = dataUrutWaktu[indeksPasangan].nominal || 0;
                            dataUrutWaktu[indeksPasangan].sudahDipakai = true;
                        }
                    }

                    // Kembalikan modal awal ke kotak modal
                    akumulasiModal += modalPasangan;
                    // Selisih bersih masuk ke profit
                    akumulasiProfit += (nomMurni - modalPasangan);
                } else {
                    if (isIn) { akumulasiProfit += nomMurni; } 
                    else { akumulasiModal -= nomMurni; }
                }
            });

            akumulasiProfit -= akumulasiKasbon;

            [...dataUrutWaktu].reverse().forEach((item) => {
                const isIn = item.tipe === 'IN';
                const nomMurni = item.nominal || 0;
                html += `
                <div class="item-kas">
                    <div>
                        <div class="item-ket">${item.keterangan}</div>
                        <div class="item-tgl">${item.tgl} | ${item.jam}</div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-weight:bold" class="${isIn ? 'nom-in' : 'nom-out'}">
                            ${isIn ? '+' : '-'}${nomMurni.toLocaleString('id-ID')}
                        </div>
                    </div>
                </div>`;
            });
        }
        
        const totalSaldoUtama = akumulasiModal + akumulasiProfit;

        document.getElementById('total-rekanan').innerText = "RP " + totalSaldoUtama.toLocaleString('id-ID');
        document.getElementById('total-bbs').innerText = "RP " + totalSaldoUtama.toLocaleString('id-ID');
        document.getElementById('box-modal-aktif').innerText = "RP " + (akumulasiModal >= 0 ? akumulasiModal.toLocaleString('id-ID') : 0);
        document.getElementById('box-kasbon-total').innerText = "RP " + akumulasiKasbon.toLocaleString('id-ID');

        const elemenProfitBox = document.getElementById('box-margin-total');
        if (akumulasiProfit >= 0) {
            elemenProfitBox.innerText = "RP " + akumulasiProfit.toLocaleString('id-ID');
            elemenProfitBox.className = "mini-amount txt-untung";
        } else {
            elemenProfitBox.innerText = "RP -" + Math.abs(akumulasiProfit).toLocaleString('id-ID');
            elemenProfitBox.className = "mini-amount txt-rugi";
        }

        document.getElementById('list-transaksi').innerHTML = html || "<p style='text-align:center; color:var(--slate); padding:10px;'>Belum ada riwayat</p>";
    });
</script>
</body>
</html>
